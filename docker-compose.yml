services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumina-postgres
    environment:
      POSTGRES_DB: lumina
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - lumina-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumina"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumina-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lumina-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: lumina-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lumina-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"

volumes:
  lumina-postgres-data:
  lumina-redis-data:
